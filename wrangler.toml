name = "cloudflare-memory-db"
main = "src/index.ts"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "app"

# [vars]
# 可以在这里设置非敏感的环境变量
# 敏感的 API_KEY 等应该通过 wrangler secret put 设置

[[kv_namespaces]]
binding = "CACHE_KV"
id = "d237d431b2e44f0382140e0c192f4b97"

[[d1_databases]]
binding = "DB"
database_name = "memory-db-prod"
database_id = "db7dfcd2-8655-4690-a8ec-d1f9985a3b1c"
migrations_dir = "./"

[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "memory-vector-index"

[ai]
binding = "AI"

# Sensitive runtime values are configured with `wrangler secret put`:
# APP_AUTH_TOKEN, ADMIN_USERNAME, ADMIN_PASSWORD, SESSION_SECRET, ENCRYPTION_KEY
