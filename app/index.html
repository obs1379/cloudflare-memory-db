<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>记忆数据库</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f2f2f7;
      --card: #ffffff;
      --card-2: #ffffff;
      --text: #111111;
      --muted: #8e8e93;
      --muted-2: #6e6e73;
      --blue: #007aff;
      --red: #ff3b30;
      --green: #34c759;
      --input: rgba(118, 118, 128, .12);
      --line: rgba(60, 60, 67, .18);
      --shadow: 0 12px 28px rgba(0, 0, 0, .05);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --card: #1c1c1e;
        --card-2: #2c2c2e;
        --text: #ffffff;
        --muted: rgba(235, 235, 245, .6);
        --muted-2: rgba(235, 235, 245, .72);
        --blue: #0a84ff;
        --red: #ff453a;
        --green: #32d74b;
        --input: rgba(118, 118, 128, .24);
        --line: rgba(84, 84, 88, .55);
        --shadow: none;
      }
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      font-size: 17px;
      line-height: 1.42;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 18px) 16px calc(env(safe-area-inset-bottom) + 44px);
    }

    .topbar {
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .user {
      color: var(--muted);
      font-size: 15px;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 34px;
      line-height: 1.08;
      letter-spacing: .2px;
      font-weight: 760;
    }

    h2 {
      margin: 26px 16px 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
      font-weight: 500;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .card.pad { padding: 16px; }

    .field, textarea {
      display: block;
      width: 100%;
      border: 0;
      outline: 0;
      border-radius: 12px;
      background: var(--input);
      color: var(--text);
      font: inherit;
      padding: 12px 14px;
      margin: 0 0 12px;
      appearance: none;
    }

    .field:last-child, textarea:last-child { margin-bottom: 0; }
    textarea { min-height: 108px; resize: vertical; }
    ::placeholder { color: var(--muted); opacity: 1; }

    .row { display: flex; align-items: center; gap: 10px; }
    .between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .grow { flex: 1; min-width: 0; }
    .hide { display: none !important; }

    button {
      border: 0;
      border-radius: 12px;
      background: var(--blue);
      color: #fff;
      font: inherit;
      font-weight: 600;
      padding: 12px 16px;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
      user-select: none;
    }

    button:active { transform: scale(.97); opacity: .86; }
    button:disabled { opacity: .45; cursor: default; }

    .primary { width: 100%; margin-top: 6px; }
    .secondary { background: var(--input); color: var(--blue); }
    .plain { background: transparent; color: var(--blue); padding: 4px 0; font-weight: 400; border-radius: 8px; }
    .danger { background: transparent; color: var(--red); padding: 4px 0; font-size: 15px; font-weight: 400; border-radius: 8px; }
    .small { padding: 9px 16px; font-size: 16px; }

    .msg {
      margin-top: 12px;
      color: var(--muted-2);
      font-size: 15px;
      word-break: break-word;
    }
    .msg.success { color: var(--green); }
    .msg.error { color: var(--red); }
    .msg.answer {
      color: var(--text);
      padding-top: 14px;
      border-top: .5px solid var(--line);
      white-space: pre-wrap;
    }

    .list-empty { padding: 16px; color: var(--muted); font-size: 15px; }

    .memory {
      padding: 16px;
      border-bottom: .5px solid var(--line);
    }
    .memory:last-child { border-bottom: 0; }
    .memory-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }
    .meta {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .content { color: var(--text); font-size: 17px; white-space: pre-wrap; word-break: break-word; }
    .account { margin-top: 8px; color: var(--blue); font-size: 13px; }

    .sheet-mask {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(0, 0, 0, .22);
      z-index: 20;
      padding: 16px;
    }
    .sheet-mask.show { display: flex; }
    .sheet {
      width: 100%;
      max-width: 420px;
      background: var(--card-2);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, .22);
      transform: translateY(8px);
      animation: rise .18s ease forwards;
    }
    @keyframes rise { to { transform: translateY(0); } }
    .sheet-body { padding: 18px 16px 12px; text-align: center; }
    .sheet-title { font-weight: 700; margin-bottom: 6px; }
    .sheet-text { color: var(--muted); font-size: 14px; }
    .sheet-actions { border-top: .5px solid var(--line); }
    .sheet-actions button {
      width: 100%;
      border-radius: 0;
      background: transparent;
      color: var(--blue);
      padding: 15px;
      border-bottom: .5px solid var(--line);
    }
    .sheet-actions button:last-child { border-bottom: 0; }
    .sheet-actions .confirm-delete { color: var(--red); font-weight: 600; }

    @media (min-width: 760px) {
      .app { padding-top: 42px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
      .grid h2 { margin-top: 0; }
      .span { grid-column: 1 / -1; }
    }
  </style>
  <script src="config.js"></script>
</head>
<body>
  <main class="app">
    <section id="loginView">
      <h1>记忆数据库</h1>
      <h2 id="apiSectionTitle" class="hide">服务器配置</h2>
      <div id="apiSection" class="card pad hide" style="margin-bottom:18px">
        <input id="apiBase" class="field" placeholder="API 地址，例如 https://your-worker.workers.dev/api" autocomplete="url" autocapitalize="none">
        <div class="msg" style="margin-top:0">未检测到配置文件，请输入你的 Worker API 地址。登录成功后会保存在本机。</div>
      </div>

      <h2>登录</h2>
      <div class="card pad">
        <input id="username" class="field" placeholder="用户名" value="admin" autocomplete="username" autocapitalize="none">
        <input id="password" class="field" placeholder="密码" type="password" autocomplete="current-password">
        <button id="loginBtn" class="primary">登录</button>
        <div id="loginMsg" class="msg error hide"></div>
      </div>
    </section>

    <section id="appView" class="hide">
      <div class="topbar">
        <div id="who" class="user"></div>
        <button id="logoutBtn" class="plain">退出</button>
      </div>
      <h1>我的记忆</h1>

      <div class="grid">
        <div>
          <h2>添加记忆</h2>
          <div class="card pad">
            <textarea id="memoryInput" placeholder="写下一条记忆，例如：护照在书房第二个抽屉"></textarea>
            <div class="between">
              <div id="saveMsg" class="msg hide" style="margin:0"></div>
              <button id="saveBtn" class="small">保存</button>
            </div>
          </div>
        </div>

        <div>
          <h2>搜索</h2>
          <div class="card pad">
            <div class="row">
              <input id="searchInput" class="field grow" placeholder="问一个问题" style="margin:0">
              <button id="searchBtn" class="small">搜索</button>
            </div>
            <div id="searchMsg" class="msg hide"></div>
          </div>
        </div>

        <div class="span">
          <div class="between">
            <h2 style="margin-bottom:8px">全部记忆</h2>
            <button id="refreshBtn" class="plain" style="font-size:15px;margin-right:16px">刷新</button>
          </div>
          <div id="memoryList" class="card">
            <div class="list-empty">正在加载…</div>
          </div>
        </div>

        <div class="span">
          <h2>LLM 配置</h2>
          <div class="card pad">
            <input id="llmEndpoint" class="field" placeholder="接口地址，例如 https://api.deepseek.com/v1/chat/completions">
            <input id="llmModel" class="field" placeholder="模型名称，例如 deepseek-chat">
            <input id="llmKey" class="field" type="password" placeholder="API Key">
            <div class="row">
              <button id="configStatusBtn" class="secondary grow">查看状态</button>
              <button id="configSaveBtn" class="grow">更新配置</button>
            </div>
            <div id="configMsg" class="msg hide"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="deleteSheet" class="sheet-mask" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="deleteTitle">
      <div class="sheet-body">
        <div id="deleteTitle" class="sheet-title">删除这条记忆？</div>
        <div class="sheet-text">删除后无法恢复。</div>
      </div>
      <div class="sheet-actions">
        <button id="confirmDeleteBtn" class="confirm-delete">删除</button>
        <button id="cancelDeleteBtn">取消</button>
      </div>
    </div>
  </div>

  <script>
    let API = '';
    const configuredApi = (window.APP_CONFIG && window.APP_CONFIG.API_BASE ? String(window.APP_CONFIG.API_BASE) : '').trim();
    const $ = id => document.getElementById(id);
    const esc = value => String(value ?? '').replace(/[&<>"']/g, char => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[char]));

    let pendingDeleteId = '';

    function headers() {
      const h = { 'Content-Type': 'application/json' };
      const token = localStorage.getItem('token');
      if (token) h.Authorization = 'Bearer ' + token;
      return h;
    }

    function show(id, html, type = 'info') {
      const el = $(id);
      el.className = 'msg ' + type;
      el.innerHTML = html;
    }

    function hide(id) { $(id).classList.add('hide'); }

    function normalizeApiBase(value) {
      let api = String(value || '').trim().replace(/\/+$/, '');
      if (api && !api.endsWith('/api')) api += '/api';
      return api;
    }

    function hasConfiguredApi() {
      return !!normalizeApiBase(configuredApi);
    }

    function initApiBase() {
      if (hasConfiguredApi()) {
        API = normalizeApiBase(configuredApi);
        $('apiSectionTitle').classList.add('hide');
        $('apiSection').classList.add('hide');
        return;
      }
      API = normalizeApiBase(localStorage.getItem('api') || '');
      $('apiBase').value = API;
      $('apiSectionTitle').classList.remove('hide');
      $('apiSection').classList.remove('hide');
    }

    function resolveApiFromForm() {
      if (hasConfiguredApi()) return normalizeApiBase(configuredApi);
      return normalizeApiBase($('apiBase').value || localStorage.getItem('api') || '');
    }

    function setBusy(button, busy, text) {
      if (!button) return;
      if (busy) {
        button.dataset.oldText = button.textContent;
        button.textContent = text;
        button.disabled = true;
      } else {
        button.textContent = button.dataset.oldText || button.textContent;
        button.disabled = false;
      }
    }

    function enterApp(username) {
      $('who').textContent = '已登录：' + (username || 'admin');
      $('loginView').classList.add('hide');
      $('appView').classList.remove('hide');
      listMemories();
    }

    async function login() {
      API = resolveApiFromForm();
      if (!API) return show('loginMsg', '请输入 API 地址', 'error');

      const username = $('username').value.trim();
      const password = $('password').value;
      if (!username || !password) return show('loginMsg', '请输入用户名和密码', 'error');

      const btn = $('loginBtn');
      setBusy(btn, true, '登录中…');
      try {
        const res = await fetch(API + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, master_password: password })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || data.message || '登录失败');

        if (!hasConfiguredApi()) localStorage.setItem('api', API);
        localStorage.setItem('token', data.data?.token || '');
        localStorage.setItem('user', data.data?.username || username);
        enterApp(data.data?.username || username);
      } catch (err) {
        show('loginMsg', esc(err.message || '登录失败'), 'error');
      } finally {
        setBusy(btn, false);
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      location.reload();
    }

    async function saveMemory() {
      const text = $('memoryInput').value.trim();
      if (!text) return;

      const btn = $('saveBtn');
      setBusy(btn, true, '保存中…');
      try {
        const res = await fetch(API + '/memory', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || data.message || '保存失败');

        $('memoryInput').value = '';
        show('saveMsg', '已保存', 'success');
        setTimeout(() => hide('saveMsg'), 2200);
        listMemories();
      } catch (err) {
        show('saveMsg', esc(err.message || '保存失败'), 'error');
      } finally {
        setBusy(btn, false);
      }
    }

    async function searchMemory() {
      const query = $('searchInput').value.trim();
      if (!query) return;

      const btn = $('searchBtn');
      setBusy(btn, true, '搜索中…');
      show('searchMsg', '正在检索…');
      try {
        const res = await fetch(API + '/memory/search?q=' + encodeURIComponent(query), { headers: headers() });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || data.message || '搜索失败');
        show('searchMsg', esc(data.answer || '没有找到相关记忆'), 'answer');
      } catch (err) {
        show('searchMsg', esc(err.message || '搜索失败'), 'error');
      } finally {
        setBusy(btn, false);
      }
    }

    async function listMemories() {
      $('memoryList').innerHTML = '<div class="list-empty">正在加载…</div>';
      try {
        const res = await fetch(API + '/memories?limit=50', { headers: headers() });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || data.message || '获取失败');

        const memories = data.data?.memories || [];
        if (!memories.length) {
          $('memoryList').innerHTML = '<div class="list-empty">暂无记忆</div>';
          return;
        }

        $('memoryList').innerHTML = memories.map(item => `
          <article class="memory">
            <div class="memory-head">
              <div class="meta">${esc(item.platform || '未分类')} · ${esc((item.created_at || '').slice(0, 10))}</div>
              <button class="danger" type="button" data-delete-id="${esc(item.id)}">删除</button>
            </div>
            <div class="content">${esc(item.raw_input || '')}</div>
            ${item.account ? `<div class="account">账号：${esc(item.account)}</div>` : ''}
          </article>
        `).join('');
      } catch (err) {
        $('memoryList').innerHTML = `<div class="list-empty" style="color:var(--red)">${esc(err.message || '获取失败')}</div>`;
      }
    }

    function openDeleteSheet(id) {
      pendingDeleteId = id;
      $('deleteSheet').classList.add('show');
      $('deleteSheet').setAttribute('aria-hidden', 'false');
    }

    function closeDeleteSheet() {
      pendingDeleteId = '';
      $('deleteSheet').classList.remove('show');
      $('deleteSheet').setAttribute('aria-hidden', 'true');
    }

    async function confirmDelete() {
      const id = pendingDeleteId;
      if (!id) return closeDeleteSheet();

      const btn = $('confirmDeleteBtn');
      setBusy(btn, true, '删除中…');
      try {
        const res = await fetch(API + '/memory/' + encodeURIComponent(id), {
          method: 'DELETE',
          headers: headers()
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || data.message || '删除失败');
        closeDeleteSheet();
        listMemories();
      } catch (err) {
        alert(err.message || '删除失败');
      } finally {
        setBusy(btn, false);
      }
    }

    async function getConfig() {
      show('configMsg', '正在读取…');
      try {
        const res = await fetch(API + '/config', { headers: headers() });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || data.message || '读取失败');
        const c = data.data || {};
        show('configMsg', `接口：${esc(c.llm_endpoint || '未设置')}<br>模型：${esc(c.llm_model || '未设置')}<br>密钥：${c.has_key ? '<span style="color:var(--green)">已配置</span>' : '<span style="color:var(--red)">未配置</span>'}`);
      } catch (err) {
        show('configMsg', esc(err.message || '读取失败'), 'error');
      }
    }

    async function updateConfig() {
      const body = {
        llm_endpoint: $('llmEndpoint').value.trim(),
        llm_model: $('llmModel').value.trim(),
        llm_key: $('llmKey').value.trim()
      };
      if (!body.llm_endpoint && !body.llm_model && !body.llm_key) return show('configMsg', '请至少填写一项配置');

      const btn = $('configSaveBtn');
      setBusy(btn, true, '更新中…');
      try {
        const res = await fetch(API + '/config', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || data.message || '更新失败');
        $('llmEndpoint').value = '';
        $('llmModel').value = '';
        $('llmKey').value = '';
        show('configMsg', '配置已更新', 'success');
      } catch (err) {
        show('configMsg', esc(err.message || '更新失败'), 'error');
      } finally {
        setBusy(btn, false);
      }
    }

    $('loginBtn').addEventListener('click', login);
    $('logoutBtn').addEventListener('click', logout);
    $('saveBtn').addEventListener('click', saveMemory);
    $('searchBtn').addEventListener('click', searchMemory);
    $('refreshBtn').addEventListener('click', listMemories);
    $('configStatusBtn').addEventListener('click', getConfig);
    $('configSaveBtn').addEventListener('click', updateConfig);
    $('cancelDeleteBtn').addEventListener('click', closeDeleteSheet);
    $('confirmDeleteBtn').addEventListener('click', confirmDelete);
    $('deleteSheet').addEventListener('click', event => {
      if (event.target.id === 'deleteSheet') closeDeleteSheet();
    });
    $('memoryList').addEventListener('click', event => {
      const btn = event.target.closest('[data-delete-id]');
      if (btn) openDeleteSheet(btn.dataset.deleteId);
    });
    $('password').addEventListener('keydown', event => { if (event.key === 'Enter') login(); });
    $('searchInput').addEventListener('keydown', event => { if (event.key === 'Enter') searchMemory(); });

    initApiBase();
    if (localStorage.getItem('token') && API) enterApp(localStorage.getItem('user') || 'admin');
  </script>
</body>
</html>
