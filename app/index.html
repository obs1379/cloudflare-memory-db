<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>记忆数据库</title>
  <style>
    :root {
      /* iOS Light Mode Colors */
      --bg-color: #F2F2F7;
      --card-bg: #FFFFFF;
      --text-main: #000000;
      --text-muted: #8E8E93;
      --tint-color: #007AFF;
      --danger-color: #FF3B30;
      --input-bg: rgba(118, 118, 128, 0.12);
      --separator: rgba(60, 60, 67, 0.29);
      --success-color: #34C759;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* iOS Dark Mode Colors */
        --bg-color: #000000;
        --card-bg: #1C1C1E;
        --text-main: #FFFFFF;
        --text-muted: #EBEBF599;
        --tint-color: #0A84FF;
        --danger-color: #FF453A;
        --input-bg: rgba(118, 118, 128, 0.24);
        --separator: rgba(84, 84, 88, 0.65);
        --success-color: #32D74B;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 0;
      line-height: 1.5;
      font-size: 17px; /* iOS standard */
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 24px 16px 60px;
    }

    /* 页面大标题 (iOS Large Title) */
    .large-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.37px;
      margin-bottom: 24px;
      margin-top: 16px;
    }

    /* 分组标题 */
    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-left: 16px;
      margin-bottom: 8px;
      margin-top: 24px;
      letter-spacing: -0.08px;
    }

    /* 卡片 (iOS Grouped Table) */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-padding {
      padding: 16px;
    }

    /* 表单元素 */
    input, textarea {
      width: 100%;
      background: var(--input-bg);
      border: none;
      color: var(--text-main);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 17px;
      outline: none;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    
    input:last-child, textarea:last-child {
      margin-bottom: 0;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    input::placeholder, textarea::placeholder {
      color: var(--text-muted);
    }

    /* 按钮 */
    .btn {
      width: 100%;
      background: var(--tint-color);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .btn-secondary {
      background: var(--input-bg);
      color: var(--tint-color);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger-color);
      font-weight: 400;
      padding: 0;
      width: auto;
      font-size: 15px;
    }

    .btn-text {
      background: transparent;
      color: var(--tint-color);
      width: auto;
      padding: 0;
      font-size: 17px;
      font-weight: 400;
    }

    /* 布局工具 */
    .flex-row { display: flex; gap: 12px; align-items: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .hide { display: none !important; }

    /* 提示信息 */
    .msg {
      font-size: 15px;
      margin-top: 12px;
      padding: 0 4px;
    }
    .msg.success { color: var(--success-color); }
    .msg.error { color: var(--danger-color); }
    .msg.info { color: var(--text-muted); }

    /* 记忆列表项 */
    .memory-item {
      padding: 16px;
      border-bottom: 0.5px solid var(--separator);
    }
    .memory-item:last-child {
      border-bottom: none;
    }
    .memory-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .memory-content {
      font-size: 17px;
      color: var(--text-main);
      line-height: 1.4;
    }
    .memory-account {
      margin-top: 8px;
      font-size: 13px;
      color: var(--tint-color);
    }

    /* 顶部导航 */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .user-info {
      font-size: 15px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- 登录视图 -->
  <div id="view-login">
    <h1 class="large-title">记忆数据库</h1>
    <div class="section-title">服务器配置</div>
    <div class="card card-padding">
      <input id="apiUrl" placeholder="API 地址 (例如 https://api.xxx.workers.dev)" value="">
    </div>
    
    <div class="section-title">身份验证</div>
    <div class="card card-padding">
      <input id="lu" placeholder="用户名" value="admin" autocapitalize="none">
      <input id="lpw" placeholder="密码" type="password">
      <button class="btn" onclick="doLogin()" style="margin-top: 16px;">登录</button>
      <div id="lr" class="msg error hide"></div>
    </div>
  </div>

  <!-- 主应用视图 -->
  <div id="view-app" class="hide">
    
    <div class="nav-bar">
      <div class="user-info">已登录：<span id="who"></span></div>
      <button class="btn btn-text" onclick="doLogout()">退出</button>
    </div>
    
    <h1 class="large-title">我的记忆</h1>

    <!-- 录入记忆 -->
    <div class="section-title">添加新记忆</div>
    <div class="card card-padding">
      <textarea id="mi" placeholder="在这里输入自然语言... 例如：我的护照在书房抽屉里"></textarea>
      <div class="flex-between" style="margin-top: 12px;">
        <div id="sr" class="msg hide" style="margin:0;"></div>
        <button class="btn" id="sb" onclick="saveMemory()" style="width: auto; padding: 8px 20px;">保存</button>
      </div>
    </div>

    <!-- 检索记忆 -->
    <div class="section-title">AI 检索</div>
    <div class="card card-padding">
      <div class="flex-row">
        <input id="qi" placeholder="提问... 例如：我的护照在哪？" style="margin-bottom: 0;">
        <button class="btn" onclick="searchMemory()" style="width: auto; padding: 12px 20px;">搜索</button>
      </div>
      <div id="qr" class="msg hide" style="margin-top: 16px; padding-top: 16px; border-top: 0.5px solid var(--separator);"></div>
    </div>

    <!-- 记忆列表 -->
    <div class="flex-between" style="margin-top: 24px;">
      <div class="section-title" style="margin-top: 0;">全部记忆</div>
      <button class="btn btn-text" style="font-size: 15px; margin-right: 16px;" onclick="listMemories()">刷新</button>
    </div>
    <div class="card" id="lr2">
      <div class="card-padding">
        <div class="msg info">加载中...</div>
      </div>
    </div>

    <!-- 系统配置 -->
    <div class="section-title">LLM 节点配置</div>
    <div class="card card-padding">
      <input id="le" placeholder="API Endpoint (例如 https://api.deepseek.com)">
      <input id="lm" placeholder="模型名称 (例如 deepseek-chat)">
      <input id="lk" type="password" placeholder="API Key">
      
      <div class="flex-row" style="margin-top: 16px;">
        <button class="btn btn-secondary" onclick="getConfig()">查看状态</button>
        <button class="btn" onclick="updateConfig()">更新配置</button>
      </div>
      <div id="cr" class="msg hide"></div>
    </div>

  </div>
</div>

<script>
let API = '';
const qs = id => document.getElementById(id);
const esc = s => String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
const show = (id, html, type = 'info') => {
  const el = qs(id);
  el.className = `msg ${type}`;
  el.innerHTML = html;
};
const hide = id => qs(id).classList.add('hide');
const hdr = () => {
  const h = {'Content-Type': 'application/json'};
  const t = localStorage.getItem('token');
  if(t) h['Authorization'] = 'Bearer ' + t;
  return h;
};

async function doLogin() {
  API = qs('apiUrl').value.trim().replace(/\/+$/, '');
  if(!API) return show('lr', '请输入 API 地址', 'error');
  const u = qs('lu').value.trim(), p = qs('lpw').value;
  if(!u || !p) return show('lr', '请输入用户名和密码', 'error');
  
  const btn = qs('lr').previousElementSibling;
  const originalText = btn.innerText;
  btn.innerText = '登录中...';
  
  try {
    const r = await fetch(API+'/login', { method:'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username:u, master_password:p}) });
    const d = await r.json();
    if(!d.success) throw new Error(d.error || '登录失败，请检查账号密码或 API 地址');
    
    if(d.data?.token) localStorage.setItem('token', d.data.token);
    localStorage.setItem('user', d.data.username);
    localStorage.setItem('api', API);
    
    qs('who').textContent = d.data.username;
    qs('view-login').classList.add('hide');
    qs('view-app').classList.remove('hide');
    listMemories();
  } catch(e) {
    show('lr', e.message, 'error');
  } finally {
    btn.innerText = originalText;
  }
}

function doLogout() {
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  location.reload();
}

function init() {
  const saved = localStorage.getItem('api');
  if(saved) qs('apiUrl').value = saved;
  const t = localStorage.getItem('token');
  if(t && saved) {
    API = saved;
    qs('who').textContent = localStorage.getItem('user') || 'admin';
    qs('view-login').classList.add('hide');
    qs('view-app').classList.remove('hide');
    listMemories();
  }
}
init();

async function saveMemory() {
  const t = qs('mi').value.trim();
  if(!t) return;
  const btn = qs('sb');
  btn.innerText = '处理中...';
  try {
    const r = await fetch(API+'/memory', { method:'POST', headers:hdr(), body:JSON.stringify({text:t}) });
    const d = await r.json();
    if(d.success) {
      show('sr', '已保存', 'success');
      qs('mi').value = '';
      listMemories();
      setTimeout(() => hide('sr'), 3000);
    } else {
      throw new Error(d.error || d.message || '保存失败');
    }
  } catch(e) {
    show('sr', e.message, 'error');
  } finally {
    btn.innerText = '保存';
  }
}

async function searchMemory() {
  const q = qs('qi').value.trim();
  if(!q) return;
  show('qr', 'AI 正在思考...', 'info');
  try {
    const r = await fetch(API+'/memory/search?q='+encodeURIComponent(q), { headers:hdr() });
    const d = await r.json();
    if(d.success) {
      show('qr', esc(d.answer).replace(/\n/g, '<br>'), 'text-main');
      qs('qr').style.color = 'var(--text-main)';
    } else {
      throw new Error(d.error || '检索失败');
    }
  } catch(e) {
    show('qr', e.message, 'error');
  }
}

async function deleteMemory(id) {
  if(!confirm('确定要删除这条记忆吗？')) return;
  try {
    const r = await fetch(API+'/memory/'+id, { method:'DELETE', headers:hdr() });
    const d = await r.json();
    if(d.success) listMemories();
    else alert('删除失败: ' + d.error);
  } catch(e) {
    alert('网络错误');
  }
}

async function listMemories() {
  qs('lr2').innerHTML = '<div class="card-padding"><div class="msg info">加载中...</div></div>';
  try {
    const r = await fetch(API+'/memories?limit=50', { headers:hdr() });
    const d = await r.json();
    if(!d.success) throw new Error(d.error || '获取失败');
    const a = d.data.memories || [];
    if(!a.length) {
      qs('lr2').innerHTML = '<div class="card-padding"><div class="msg info">暂无记忆</div></div>';
      return;
    }
    let h = '';
    a.forEach(m => {
      h += `
        <div class="memory-item">
          <div class="flex-between memory-meta">
            <span>${esc(m.platform || '未分类')} · ${esc((m.created_at || '').slice(0,10))}</span>
            <button class="btn-danger" onclick="deleteMemory('${m.id}')">删除</button>
          </div>
          <div class="memory-content">${esc(m.raw_input || '')}</div>
          ${m.account ? `<div class="memory-account">账号: ${esc(m.account)}</div>` : ''}
        </div>
      `;
    });
    qs('lr2').innerHTML = h;
  } catch(e) {
    qs('lr2').innerHTML = `<div class="card-padding"><div class="msg error">${esc(e.message)}</div></div>`;
  }
}

async function getConfig() {
  try {
    const r = await fetch(API+'/config', { headers:hdr() });
    const d = await r.json();
    if(!d.success) throw new Error(d.error || '获取配置失败');
    const c = d.data || {};
    let html = `
      <div style="margin-top: 12px; font-size: 15px;">
        <div style="margin-bottom: 4px;"><span style="color:var(--text-muted)">接口:</span> ${esc(c.llm_endpoint) || '未设置'}</div>
        <div style="margin-bottom: 4px;"><span style="color:var(--text-muted)">模型:</span> ${esc(c.llm_model) || '未设置'}</div>
        <div><span style="color:var(--text-muted)">密钥:</span> ${c.has_key ? '<span style="color:var(--success-color)">已配置</span>' : '<span style="color:var(--danger-color)">未配置</span>'}</div>
      </div>
    `;
    show('cr', html, 'info');
  } catch(e) {
    show('cr', e.message, 'error');
  }
}

async function updateConfig() {
  const body = {
    llm_endpoint: qs('le').value.trim(),
    llm_model: qs('lm').value.trim(),
    llm_key: qs('lk').value.trim()
  };
  if(!body.llm_endpoint && !body.llm_model && !body.llm_key) return;
  
  const btn = event.target;
  const originalText = btn.innerText;
  btn.innerText = '更新中...';
  
  try {
    const r = await fetch(API+'/config', { method:'POST', headers:hdr(), body:JSON.stringify(body) });
    const d = await r.json();
    if(d.success) {
      show('cr', '配置已更新', 'success');
      qs('le').value = ''; qs('lm').value = ''; qs('lk').value = '';
      setTimeout(() => hide('cr'), 3000);
    } else {
      throw new Error(d.error || '更新失败');
    }
  } catch(e) {
    show('cr', e.message, 'error');
  } finally {
    btn.innerText = originalText;
  }
}
</script>
</body>
</html>
